<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="focusy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20a39e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#178581;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring representing the Project/Session container -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#focusy-gradient)" stroke-width="3" stroke-dasharray="200 60" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite" />
  </circle>
  <!-- Inner segments representing discrete Pomodoro blocks/Tasks -->
  <path d="M50 20 A 30 30 0 0 1 80 50" fill="none" stroke="url(#focusy-gradient)" stroke-width="6" stroke-linecap="round" opacity="0.3" />
  <path d="M80 50 A 30 30 0 0 1 50 80" fill="none" stroke="url(#focusy-gradient)" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  <path d="M50 80 A 30 30 0 0 1 20 50" fill="none" stroke="url(#focusy-gradient)" stroke-width="6" stroke-linecap="round" />
  <!-- Central 'f' curve representing flow and the timer engine -->
  <path d="M50 35 C 58 35, 58 50, 50 50 C 42 50, 42 65, 50 65" fill="none" stroke="url(#focusy-gradient)" stroke-width="4" stroke-linecap="round" />
</svg>